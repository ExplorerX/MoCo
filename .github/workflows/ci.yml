name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate web and domain packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Run Morse core tests
        run: node --experimental-strip-types --test tests/morse-core.test.ts

      - name: Run training engine tests
        run: node --experimental-strip-types --test tests/training-engine.test.ts

      - name: Run audio engine tests
        run: node --experimental-strip-types --test tests/audio-engine.test.ts

      - name: Run input engine tests
        run: node --experimental-strip-types --test tests/input-engine.test.ts

      - name: Run storage integration tests
        run: node --experimental-strip-types --test tests/integration/storage.test.ts

      - name: Run web and PWA tests
        run: >-
          node --experimental-strip-types --test
          tests/routes.test.ts
          tests/pwa.test.mjs
          tests/rendered-html.test.mjs
